version: "3.9"

services:
  interviewiq:
    build: .
    ports:
      - "8000:8000"
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns
    restart: unless-stopped
