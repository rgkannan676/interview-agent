- id: dp_sd_001
  type: System Design
  difficulty: Mid
  question: "Design a data ingestion pipeline that collects clickstream events from a mobile app and makes them available for analytics within 5 minutes."

- id: dp_sd_002
  type: System Design
  difficulty: Senior
  question: "Design a data lakehouse platform that supports both streaming and batch analytics for a company processing 10TB of data per day."

