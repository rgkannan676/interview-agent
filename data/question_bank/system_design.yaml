# ── ML / AI System Design ─────────────────────────────────────────────────────

- id: ml_sd_001
  type: System Design
  difficulty: Mid
  question: "Design a real-time recommendation system for a content platform. How do you handle the cold-start problem and keep recommendations fresh?"

- id: ml_sd_002
  type: System Design
  difficulty: Mid
  question: "How would you design a real-time fraud detection system using a machine learning model? Focus on latency, explainability, and feedback loops."

- id: ml_sd_003
  type: System Design
  difficulty: Senior
  question: "Design an end-to-end ML platform: data ingestion, feature engineering, experiment tracking, model training, and online serving."

- id: ml_sd_004
  type: System Design
  difficulty: Senior
  question: "Design a feature store that supports both batch and real-time feature computation and serving with point-in-time correctness."

- id: ml_sd_005
  type: System Design
  difficulty: Senior
  question: "Design a vector search system that handles billions of embeddings with sub-50ms p99 latency."

- id: ml_sd_006
  type: System Design
  difficulty: Senior
  question: "How would you design a model serving infrastructure that supports shadow deployments, A/B testing, and automatic rollbacks?"

- id: ml_sd_007
  type: System Design
  difficulty: Principal
  question: "Design a unified ML platform at the scale of a large tech company — spanning data, training, evaluation, deployment, and monitoring for hundreds of models across many teams."

