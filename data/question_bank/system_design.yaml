- id: fe_sd_001
  type: System Design
  difficulty: Mid
  question: "Design a frontend architecture for a web application that needs to support 10 million daily active users. How do you handle caching, CDN, and asset delivery?"

- id: fe_sd_002
  type: System Design
  difficulty: Mid
  question: "How would you design a reusable component library shared across multiple product teams?"

- id: fe_sd_003
  type: System Design
  difficulty: Senior
  question: "Design a micro-frontend architecture for a large e-commerce platform where multiple teams own different sections of the site."

- id: fe_sd_004
  type: System Design
  difficulty: Senior
  question: "How would you design a real-time collaborative whiteboard application in the browser? Focus on state synchronisation and conflict resolution."

