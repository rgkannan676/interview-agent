- id: cloud_sd_001
  type: System Design
  difficulty: Mid
  question: "Design a CI/CD pipeline for a microservices platform with 50 services. How do you handle dependencies, testing, and safe rollouts?"

- id: cloud_sd_002
  type: System Design
  difficulty: Senior
  question: "How would you design a multi-region disaster recovery strategy for a SaaS platform with an RTO of 5 minutes and RPO of 30 seconds?"

- id: cloud_sd_003
  type: System Design
  difficulty: Senior
  question: "Design a secrets and configuration management system for a large Kubernetes-based platform. How do you handle rotation, audit trails, and least-privilege access?"

